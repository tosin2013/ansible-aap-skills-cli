name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Shell lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint install.sh
        run: shellcheck install.sh

      - name: Lint all config.sh files
        run: |
          for f in skills/*/config.sh; do
            echo "Checking $f"
            shellcheck "$f"
          done

  test:
    name: bats tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get install -y bats

      - name: Run tests
        run: bats tests/install.bats

  verify-structure:
    name: Verify skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check every skill has SKILL.md and config.sh
        run: |
          EXIT=0
          for skill_dir in skills/*/; do
            skill=$(basename "$skill_dir")
            if [[ ! -f "${skill_dir}/SKILL.md" ]]; then
              echo "MISSING: ${skill_dir}SKILL.md"
              EXIT=1
            fi
            if [[ ! -f "${skill_dir}/config.sh" ]]; then
              echo "MISSING: ${skill_dir}config.sh"
              EXIT=1
            fi
            echo "OK: $skill"
          done
          exit $EXIT
